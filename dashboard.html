<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DOE Dashboard</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="assets/css/styles.css">

</head>

<body>

<div class="container py-5">

    <!-- HEADER -->

    <div class="dashboard-header mb-5">

        <span class="dashboard-tag"
              id="tipoEjercicio">
        </span>

        <h1 class="dashboard-title mt-4"
            id="tituloEjercicio">
        </h1>

    </div>

    <!-- INFORMACIÓN GENERAL -->

    <div class="card-custom mb-5">

        <div class="row">

            <div class="col-md-3">

                <h6>Estudiante</h6>

                <p id="estudiante"></p>

            </div>

            <div class="col-md-3">

                <h6>Curso</h6>

                <p id="curso"></p>

            </div>

            <div class="col-md-3">

                <h6>Universidad</h6>

                <p id="universidad"></p>

            </div>

            <div class="col-md-3">

                <h6>Fecha</h6>

                <p id="fecha"></p>

            </div>

        </div>

    </div>

    <!-- ENUNCIADO -->

    <section class="mb-5">

        <h2 class="section-title">
            ENUNCIADO DEL EXPERIMENTO
        </h2>

        <div class="card-custom">

            <div class="placeholder-box">

                Imagen del problema

            </div>

        </div>

    </section>

    <!-- MINITAB -->

    <section class="mb-5">

        <h2 class="section-title">
            MINITAB
        </h2>

        <div class="card-custom">

            <div class="gallery-grid">

                <div class="placeholder-box">
                    Evidencia 1
                </div>

                <div class="placeholder-box">
                    Evidencia 2
                </div>

                <div class="placeholder-box">
                    Evidencia 3
                </div>

            </div>

        </div>

    </section>

    <!-- EXCEL -->

    <section class="mb-5">

        <h2 class="section-title">
            EXCEL
        </h2>

        <div class="card-custom">

            <div class="gallery-grid">

                <div class="placeholder-box">
                    Evidencia Excel
                </div>

                <div class="placeholder-box">
                    Evidencia Excel
                </div>

            </div>

        </div>

    </section>

    <!-- PYTHON -->

    <section class="mb-5">

        <h2 class="section-title">
            PYTHON
        </h2>

        <div class="card-custom">

            <div class="gallery-grid">

                <div class="placeholder-box">
                    Código Python
                </div>

                <div class="placeholder-box">
                    Resultados Python
                </div>

            </div>

        </div>

    </section>

    <!-- R -->

    <section class="mb-5">

        <h2 class="section-title">
            R
        </h2>

        <div class="card-custom">

            <div class="gallery-grid">

                <div class="placeholder-box">
                    Código R
                </div>

                <div class="placeholder-box">
                    Resultados R
                </div>

            </div>

        </div>

    </section>

    <!-- CONCLUSIONES -->

    <section>

        <h2 class="section-title">
            CONCLUSIONES
        </h2>

        <div class="card-custom">

            <p id="conclusionesTexto"></p>

        </div>

    </section>

</div>

<!-- JS -->

<script src="assets/js/dashboard.js"></script>

</body>
</html>
