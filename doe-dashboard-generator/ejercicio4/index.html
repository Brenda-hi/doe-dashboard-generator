<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard DOE</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../assets/css/styles.css">

</head>

<body>

<div class="container py-5">

    <!-- HEADER -->

    <div class="mb-5">

        <span class="dashboard-tag"
              id="tipoEjercicio">

        </span>

        <h1 class="dashboard-title mt-4"
            id="tituloEjercicio">

        </h1>

    </div>

    <!-- INFORMACIÓN GENERAL -->

    <div class="card-custom mb-5">

        <div class="row">

            <div class="col-md-3">

                <h6>Estudiante</h6>

                <p id="estudiante"></p>

            </div>

            <div class="col-md-3">

                <h6>Curso</h6>

                <p id="curso"></p>

            </div>

            <div class="col-md-3">

                <h6>Universidad</h6>

                <p id="universidad"></p>

            </div>

            <div class="col-md-3">

                <h6>Fecha</h6>

                <p id="fecha"></p>

            </div>

        </div>

    </div>

    <!-- KPI -->

    <div class="row g-4 mb-5">

        <div class="col-md-3">

            <div class="card-custom text-center">

                <h6 class="text-secondary">
                    Tipo
                </h6>

                <h3 id="kpiTipo"></h3>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card-custom text-center">

                <h6 class="text-secondary">
                    Software
                </h6>

                <h3>
                    Excel + Minitab
                </h3>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card-custom text-center">

                <h6 class="text-secondary">
                    Evidencias
                </h6>

                <h3>
                    10
                </h3>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card-custom text-center">

                <h6 class="text-secondary">
                    Estado
                </h6>

                <h3>
                    Completo
                </h3>

            </div>

        </div>

    </div>

    <!-- ENUNCIADO -->

    <section class="mb-5">

        <h2 class="section-title">
            ENUNCIADO DEL EXPERIMENTO
        </h2>

        <div class="card-custom">

            <img src="images/enunciado.png"
                 class="img-fluid rounded">

        </div>

    </section>

    <!-- MINITAB -->

    <section class="mb-5">

        <h2 class="section-title">
            MINITAB
        </h2>

        <div class="card-custom">

            <div class="gallery-grid">

                <img src="images/minitab1.png">

                <img src="images/minitab2.png">

                <img src="images/minitab3.png">

            </div>

        </div>

    </section>

    <!-- EXCEL -->

    <section class="mb-5">

        <h2 class="section-title">
            EXCEL
        </h2>

        <div class="card-custom">

            <div class="gallery-grid">

                <img src="images/excel1.png">

                <img src="images/excel2.png">

            </div>

        </div>

    </section>

    <!-- PYTHON -->

    <section class="mb-5">

        <h2 class="section-title">
            PYTHON
        </h2>

        <div class="card-custom">

            <div class="gallery-grid">

                <img src="images/python1.png">

                <img src="images/python2.png">

            </div>

        </div>

    </section>

    <!-- R -->

    <section class="mb-5">

        <h2 class="section-title">
            R
        </h2>

        <div class="card-custom">

            <div class="gallery-grid">

                <img src="images/r1.png">

                <img src="images/r2.png">

            </div>

        </div>

    </section>

    <!-- CONCLUSIONES -->

    <section>

        <h2 class="section-title">
            CONCLUSIONES
        </h2>

        <div class="card-custom">

            <p id="conclusiones"></p>

        </div>

    </section>

</div>

<!-- JS -->

<script src="data.js"></script>

</body>
</html>
