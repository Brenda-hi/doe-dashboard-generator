<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DOE Dashboard Generator</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="assets/css/styles.css">

</head>

<body>

<div class="container py-5">

    <div class="text-center mb-5">

        <span class="dashboard-tag">
            DOE DASHBOARD GENERATOR
        </span>

        <h1 class="dashboard-title mt-4">
            Crear Dashboard
        </h1>

    </div>

    <div class="card-custom">

        <div class="row g-4">

            <!-- TIPO -->

            <div class="col-md-6">

                <label class="form-label">
                    Tipo de ejercicio
                </label>

                <select class="form-control"
                        id="tipo">

                    <option>
                        CUADRADO LATINO
                    </option>

                    <option>
                        DISEÑO FACTORIAL
                    </option>

                </select>

            </div>

            <!-- TITULO -->

            <div class="col-md-6">

                <label class="form-label">
                    Título
                </label>

                <input type="text"
                       class="form-control"
                       id="titulo">

            </div>

            <!-- ESTUDIANTE -->

            <div class="col-md-6">

                <label class="form-label">
                    Estudiante
                </label>

                <input type="text"
                       class="form-control"
                       id="estudiante">

            </div>

            <!-- CURSO -->

            <div class="col-md-6">

                <label class="form-label">
                    Curso
                </label>

                <input type="text"
                       class="form-control"
                       id="curso">

            </div>

            <!-- UNIVERSIDAD -->

            <div class="col-md-6">

                <label class="form-label">
                    Universidad
                </label>

                <input type="text"
                       class="form-control"
                       id="universidad">

            </div>

            <!-- FECHA -->

            <div class="col-md-6">

                <label class="form-label">
                    Fecha
                </label>

                <input type="text"
                       class="form-control"
                       id="fecha">

            </div>
            <!-- CONCLUSIONES -->

            <div class="col-12">

                <label class="form-label">
                    Conclusiones
                </label>

                <textarea class="form-control"
                          rows="6"
                          id="conclusiones"></textarea>

            </div>

            <!-- BOTON -->

            <div class="col-12 text-center">

                <button class="btn btn-primary btn-lg"
                        onclick="generarDashboard()">

                    GENERAR DASHBOARD

                </button>

            </div>

        </div>

    </div>

</div>

<!-- JS -->

<script src="assets/js/app.js"></script>

</body>
</html>
